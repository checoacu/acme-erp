<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Ferretería ACME</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-content">
            <h1>🔧 Ferretería ACME</h1>
            <p>Sistema ERP — Gestión de Productos</p>
        </div>
    </header>

    <main>

        <!-- FORMULARIO INGRESO -->
        <section class="card">
            <h2>➕ Ingresar Nuevo Producto</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Nombre *</label>
                    <input type="text" id="nombre" placeholder="Ej: Martillo">
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <input type="text" id="categoria" placeholder="Ej: Herramientas">
                </div>
                <div class="form-group">
                    <label>Precio (CLP) *</label>
                    <input type="number" id="precio" placeholder="Ej: 4990">
                </div>
                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" id="stock" placeholder="Ej: 50">
                </div>
                <div class="form-group full-width">
                    <label>Descripción</label>
                    <textarea id="descripcion" placeholder="Descripción del producto..."></textarea>
                </div>
            </div>
            <button onclick="agregarProducto()">Agregar Producto</button>
            <div id="mensaje"></div>
        </section>

        <!-- TABLA DE PRODUCTOS -->
        <section class="card">
            <div class="table-header">
                <h2>📦 Inventario de Productos</h2>
                <button onclick="cargarProductos()" class="btn-refresh">🔄 Actualizar</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Categoría</th>
                            <th>Descripción</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Fecha Ingreso</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-productos">
                        <tr><td colspan="8">Cargando productos...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <footer>
        <p>Ferretería ACME © 2025 — Sistema ERP v1.0 | Powered by Node.js + MariaDB + Docker</p>
    </footer>

    <script>
        // Cargar productos al iniciar
        window.onload = cargarProductos;

        async function cargarProductos() {
            try {
                const res = await fetch('/api/productos');
                const productos = await res.json();
                const tbody = document.getElementById('tabla-productos');

                if (productos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8">No hay productos registrados.</td></tr>';
                    return;
                }

                tbody.innerHTML = productos.map(p => `
                    <tr>
                        <td>${p.id}</td>
                        <td>${p.nombre}</td>
                        <td>${p.categoria || '-'}</td>
                        <td>${p.descripcion || '-'}</td>
                        <td>$${Number(p.precio).toLocaleString('es-CL')}</td>
                        <td>${p.stock}</td>
                        <td>${new Date(p.fecha_ingreso).toLocaleDateString('es-CL')}</td>
                        <td><button class="btn-delete" onclick="eliminarProducto(${p.id})">🗑️ Eliminar</button></td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error('Error al cargar productos:', err);
            }
        }

        async function agregarProducto() {
            const nombre = document.getElementById('nombre').value.trim();
            const descripcion = document.getElementById('descripcion').value.trim();
            const categoria = document.getElementById('categoria').value.trim();
            const precio = document.getElementById('precio').value;
            const stock = document.getElementById('stock').value;

            if (!nombre || !precio) {
                mostrarMensaje('⚠️ Nombre y precio son obligatorios.', 'error');
                return;
            }

            try {
                const res = await fetch('/api/productos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, descripcion, categoria, precio, stock })
                });

                const data = await res.json();

                if (res.ok) {
                    mostrarMensaje('✅ Producto agregado correctamente.', 'success');
                    limpiarFormulario();
                    cargarProductos();
                } else {
                    mostrarMensaje(`❌ Error: ${data.error}`, 'error');
                }
            } catch (err) {
                mostrarMensaje('❌ Error de conexión con el servidor.', 'error');
            }
        }

        async function eliminarProducto(id) {
            if (!confirm('¿Estás seguro de eliminar este producto?')) return;

            try {
                const res = await fetch(`/api/productos/${id}`, { method: 'DELETE' });
                const data = await res.json();

                if (res.ok) {
                    mostrarMensaje('✅ Producto eliminado correctamente.', 'success');
                    cargarProductos();
                } else {
                    mostrarMensaje(`❌ Error: ${data.error}`, 'error');
                }
            } catch (err) {
                mostrarMensaje('❌ Error de conexión con el servidor.', 'error');
            }
        }

        function mostrarMensaje(texto, tipo) {
            const div = document.getElementById('mensaje');
            div.textContent = texto;
            div.className = tipo;
            setTimeout(() => div.textContent = '', 3000);
        }

        function limpiarFormulario() {
            ['nombre', 'descripcion', 'categoria', 'precio', 'stock'].forEach(id => {
                document.getElementById(id).value = '';
            });
        }
    </script>

</body>
</html>
