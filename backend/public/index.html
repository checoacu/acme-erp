<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ACME Ferretería - Portal ERP</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-container">
    <h1>ACME Ferretería y Distribuidora de Energía</h1>
    <h2>Portal de Acceso ERP</h2>
    <form id="loginForm">
      <label for="email">Correo</label>
      <input type="email" id="email" required placeholder="admin@acme.cl">

      <label for="password">Contraseña</label>
      <input type="password" id="password" required placeholder="********">

      <button type="submit">Ingresar</button>
    </form>
    <p id="mensaje"></p>
  </div>
  <script src="js/login.js"></script>
</body>
</html>
